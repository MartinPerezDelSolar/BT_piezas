<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pez Control Center</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a1a1a; color: white; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 10px; border: none; background: #007bff; color: white; transition: 0.3s; }
        button:hover { background: #0056b3; }
        #status { margin-top: 20px; color: #888; }
    </style>
</head>
<body>
    <h1>Sincronizar Pecera</h1>
    <button onclick="conectarYEnviar()">Sincronizar Hora Actual</button>
    <p id="status">Esperando conexión...</p>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        async function conectarYEnviar() {
            const status = document.getElementById('status');
            try {
                status.innerText = "Buscando dispositivo...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Reloj Pez' }],
                    optionalServices: [SERVICE_UUID]
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                const ahora = new Date();
                const textoHora = ahora.getHours().toString().padStart(2, '0') + ":" + 
                                  ahora.getMinutes().toString().padStart(2, '0');

                await characteristic.writeValue(new TextEncoder().encode(textoHora));
                
                status.innerText = "¡Hora enviada: " + textoHora + "!";
                await device.gatt.disconnect();
            } catch (error) {
                status.innerText = "Error: " + error;
                console.error(error);
            }
        }
    </script>
</body>
</html>
